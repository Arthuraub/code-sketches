<!DOCTYPE html>

<head>
<meta charset="utf-8">
<title>mes sketches p5.js</title>

<style>

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #fafafa;
  color: #222;
  margin: 0;
  padding: 20px;
}



h1 {
  font-size: 28px;
  margin-bottom: 4px;
}

.intro {
color: #666;
  margin-top: 0;
  margin-bottom: 30px;
}


/* galerie */

.gallery {
  display: flex;
flex-wrap: wrap;
gap: 16px;
}

.item {
  width: 220px;
  background: white;
  border: 1px solid #ddd;
border-radius: 6px;
 overflow: hidden;
text-decoration: none;
color: #222;
}

.item:hover {
  border-color: #888;
}

.item img {
  width: 220px;
  height: 160px;
  object-fit: cover;
  display: block;
  background: #eee;
}

.item span {
  display: block;
  padding: 8px 10px;
  font-size: 14px;
}


/* fenetre */

#lightbox {
  display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.8);
}

#lightbox iframe {
  position: absolute;
  top: 5%;
  left: 5%;
  width: 90%;
  height: 90%;
  border: none;
  background: white;
}

.close {
  position: absolute;
  top: 15px;
  right: 25px;
  color: white;
  font-size: 34px;
  cursor: pointer;
}

</style>
</head>

<body>

<div id="lightbox">
  <span class="close">&times;</span>
  <iframe id="frame" src=""></iframe>
</div>

<script>

// clic
var items = document.querySelectorAll(".item");
var lightbox = document.getElementById("lightbox");
var frame = document.getElementById("frame");

for (var i = 0; i < items.length; i++) {
  items[i].onclick = function(e) {
    e.preventDefault();
    frame.src = this.href;
    lightbox.style.display = "block";
  }
}

document.querySelector(".close").onclick = function() {
  lightbox.style.display = "none";
  frame.src = "";
}

lightbox.onclick = function(e) {
  if (e.target == lightbox) {
    lightbox.style.display = "none";
    frame.src = "";
  }
}

</script>

</body>
